<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbolle - Adiviná al jugador</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="aplicacion">
        <header id="encabezadoPrincipal">
            <h1>Futbolle</h1>
            <p>Adiviná el jugador de fútbol secreto</p>
        </header>
        <nav id="navegacionPrincipal">
            <a href="contacto.html">Contacto</a>
            <a id="enlaceGithub" href="https://github.com/LuciaMaximino/futbolle.git" target="_blank" rel="noopener">Ver código en GitHub</a>
            <button type="button" id="botonTema">Modo claro</button>
        </nav>
        <section id="seccionBusqueda">
            <input type="text" id="inputJugador" placeholder="Escribí el nombre de un jugador...">
            <ul id="listaSugerencias" class="oculto">
            </ul>
        </section>
        <section id="seccionEstado">
            <p id="contadorIntentos">Intentos restantes: 8</p>
            <p id="mostrarTiempo">Tiempo: 00:00</p>
        </section>
        <section id="seccionTablero">
            <div id="encabezadoTablero">
                <span>Jugador</span>
                <span>Nacionalidad</span>
                <span>Club</span>
                <span>Posición</span>
                <span>Edad</span>
                <span>Overall</span>
                <span>Altura</span>
            </div>
            <div id="cuerpoTablero">
            </div>
        </section>
        <button type="button" id="botonReiniciar">Reiniciar partida</button>
        <button type="button" id="botonVerHistorial">Ver historial</button>
    </div>
    <div id="modalNombre" class="modal">
        <div class="contenidoModal">
            <p>Ingresá tu nombre para comenzar</p>
            <input type="text" id="inputNombreJugador" placeholder="Tu nombre...">
            <p id="mensajeErrorNombre" class="oculto"></p>
            <button type="button" id="botonComenzar">Comenzar</button>
        </div>
    </div>
    <div id="modalGanar" class="modal oculto">
        <div class="contenidoModal">
            <p id="mensajeGanar"></p>
            <button type="button" id="botonCerrarGanar">Cerrar</button>
        </div>
    </div>
    <div id="modalPerder" class="modal oculto">
        <div class="contenidoModal">
            <p id="mensajePerder"></p>
            <button type="button" id="botonCerrarPerder">Cerrar</button>
        </div>
    </div>
    <div id="modalError" class="modal oculto">
        <div class="contenidoModal">
            <p id="mensajeError"></p>
            <button type="button" id="botonCerrarError">Cerrar</button>
        </div>
    </div>
    <div id="modalHistorial" class="modal oculto">
        <div class="contenidoModal contenidoModalHistorial">
            <h2>Historial de partidas</h2>
            <div id="ordenamientoHistorial">
                <button type="button" id="botonOrdenarFecha">Ordenar por fecha</button>
                <button type="button" id="botonOrdenarIntentos">Ordenar por intentos</button>
            </div>
            <div id="listaHistorial">
            </div>
            <button type="button" id="botonCerrarHistorial">Cerrar</button>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
